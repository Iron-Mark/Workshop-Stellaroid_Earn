<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Certificate document with hex hash — register a credential on-chain">
  <title>Register Certificate</title>
  <!--
    Pixel art certificate icon — 80×64 canvas.

    Document: polygon with top-right folded corner (classic certificate / PDF cue).
    Interior:
      - Two title bars  (lighter gray — certificate heading)
      - Three body lines (darker gray — certificate fields)
      - Hash strip       (amber — the 64-char SHA-256 hex)
          6 × 4px blocks (hex pairs) + ··· (truncation dots)
          communicates "paste or upload the hash"
    No coin — coin = Stellaroid brand; this icon is the certificate itself.
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .fold{fill:#475569}
      .title{fill:#94A3B8}
      .line{fill:#475569}
      .hash-bg{fill:#451A03}
      .hash{fill:#F59E0B}
      .hash2{fill:#D97706}
      .dot{fill:#D97706}
    </style>
  </defs>

  <!-- Drop shadow (offset +2 / +2) -->
  <polygon points="10,6 58,6 70,18 70,62 10,62" fill="#0F172A" opacity="0.55"/>

  <!-- Document border (folded-corner polygon) -->
  <polygon points="8,4 56,4 68,16 68,60 8,60" class="bdr"/>

  <!-- Document face -->
  <polygon points="10,6 55,6 66,17 66,58 10,58" class="card"/>

  <!-- Fold triangle (lighter face — folded corner of page) -->
  <polygon points="56,4 68,4 68,16" class="fold"/>

  <!-- Fold crease line -->
  <line x1="56" y1="4" x2="68" y2="16" stroke="#334155" stroke-width="1.5"/>

  <!-- ── DOCUMENT CONTENT ─────────────────────────────── -->

  <!-- Title bars (certificate heading text, 2 lines) -->
  <rect x="16" y="14" width="30" height="4" class="title" shape-rendering="crispEdges"/>
  <rect x="16" y="20" width="22" height="4" class="title" shape-rendering="crispEdges"/>

  <!-- Section divider -->
  <rect x="16" y="27" width="42" height="1" class="bdr" shape-rendering="crispEdges"/>

  <!-- Body text lines (certificate fields: name, date, cohort) -->
  <rect x="16" y="31" width="38" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="35" width="34" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="39" width="28" height="2" class="line" shape-rendering="crispEdges"/>

  <!-- ── HASH STRIP ──────────────────────────────────── -->
  <!-- Dark amber background — 64-char hex hash zone -->
  <rect x="16" y="45" width="44" height="9" class="hash-bg" shape-rendering="crispEdges"/>

  <!-- 6 hex-pair blocks (representing: e3 b0 c4 42 98 fc …) -->
  <rect x="17" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="22" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="27" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="32" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="37" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="42" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>

  <!-- ··· truncation dots (hash continues to 64 chars) -->
  <rect x="49" y="50" width="2" height="2" class="dot" shape-rendering="crispEdges"/>
  <rect x="53" y="50" width="2" height="2" class="dot" shape-rendering="crispEdges"/>
  <rect x="57" y="50" width="2" height="2" class="dot" shape-rendering="crispEdges"/>

</svg>
