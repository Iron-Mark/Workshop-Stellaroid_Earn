<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" role="img" aria-label="Stellaroid Earn">
  <title>Stellaroid Earn</title>
  <defs>
    <style>
      .sh{fill:#78350F}.md{fill:#B45309}.hi{fill:#FBBF24}.gl{fill:#FEF3C7}
    </style>
  </defs>
  <!-- Coin icon — scaled 0.9375× to fit 60px within 64px height, nudged down 4px to center -->
  <!-- S depth treatment matches logo-512.svg: strokes → .md, cast shadows → .sh -->
  <g transform="translate(0, 4) scale(0.9375)" shape-rendering="crispEdges">
    <!-- Row 1 — top coin rim -->
    <rect class="sh" x="20" y="4" width="4" height="4"/><rect class="sh" x="24" y="4" width="4" height="4"/><rect class="sh" x="28" y="4" width="4" height="4"/><rect class="sh" x="32" y="4" width="4" height="4"/><rect class="sh" x="36" y="4" width="4" height="4"/><rect class="sh" x="40" y="4" width="4" height="4"/>
    <!-- Row 2 -->
    <rect class="sh" x="12" y="8" width="4" height="4"/><rect class="sh" x="16" y="8" width="4" height="4"/><rect class="md" x="20" y="8" width="4" height="4"/><rect class="md" x="24" y="8" width="4" height="4"/><rect class="md" x="28" y="8" width="4" height="4"/><rect class="md" x="32" y="8" width="4" height="4"/><rect class="md" x="36" y="8" width="4" height="4"/><rect class="md" x="40" y="8" width="4" height="4"/><rect class="sh" x="44" y="8" width="4" height="4"/><rect class="sh" x="48" y="8" width="4" height="4"/>
    <!-- Row 3 — coin face; extra .gl at x=20 above S top-left -->
    <rect class="sh" x="8" y="12" width="4" height="4"/><rect class="md" x="12" y="12" width="4" height="4"/><rect class="hi" x="16" y="12" width="4" height="4"/><rect class="gl" x="20" y="12" width="4" height="4"/><rect class="hi" x="24" y="12" width="4" height="4"/><rect class="gl" x="28" y="12" width="4" height="4"/><rect class="hi" x="32" y="12" width="4" height="4"/><rect class="hi" x="36" y="12" width="4" height="4"/><rect class="hi" x="40" y="12" width="4" height="4"/><rect class="hi" x="44" y="12" width="4" height="4"/><rect class="md" x="48" y="12" width="4" height="4"/><rect class="sh" x="52" y="12" width="4" height="4"/>
    <!-- Row 4 — S top bar (stroke body → .md) -->
    <rect class="sh" x="8" y="16" width="4" height="4"/><rect class="md" x="12" y="16" width="4" height="4"/><rect class="hi" x="16" y="16" width="4" height="4"/><rect class="md" x="20" y="16" width="4" height="4"/><rect class="md" x="24" y="16" width="4" height="4"/><rect class="md" x="28" y="16" width="4" height="4"/><rect class="md" x="32" y="16" width="4" height="4"/><rect class="md" x="36" y="16" width="4" height="4"/><rect class="hi" x="40" y="16" width="4" height="4"/><rect class="hi" x="44" y="16" width="4" height="4"/><rect class="md" x="48" y="16" width="4" height="4"/><rect class="sh" x="52" y="16" width="4" height="4"/>
    <!-- Row 5 — S left stem (.md) + cast shadow below top bar at x=24–36 -->
    <rect class="sh" x="4" y="20" width="4" height="4"/><rect class="md" x="8" y="20" width="4" height="4"/><rect class="hi" x="12" y="20" width="4" height="4"/><rect class="hi" x="16" y="20" width="4" height="4"/><rect class="md" x="20" y="20" width="4" height="4"/><rect class="sh" x="24" y="20" width="4" height="4"/><rect class="sh" x="28" y="20" width="4" height="4"/><rect class="sh" x="32" y="20" width="4" height="4"/><rect class="sh" x="36" y="20" width="4" height="4"/><rect class="hi" x="40" y="20" width="4" height="4"/><rect class="hi" x="44" y="20" width="4" height="4"/><rect class="md" x="48" y="20" width="4" height="4"/><rect class="md" x="52" y="20" width="4" height="4"/><rect class="sh" x="56" y="20" width="4" height="4"/>
    <!-- Row 6 — S left stem (.md) + shadow right of left stem at x=24 -->
    <rect class="sh" x="4" y="24" width="4" height="4"/><rect class="md" x="8" y="24" width="4" height="4"/><rect class="hi" x="12" y="24" width="4" height="4"/><rect class="hi" x="16" y="24" width="4" height="4"/><rect class="md" x="20" y="24" width="4" height="4"/><rect class="sh" x="24" y="24" width="4" height="4"/><rect class="hi" x="28" y="24" width="4" height="4"/><rect class="hi" x="32" y="24" width="4" height="4"/><rect class="hi" x="36" y="24" width="4" height="4"/><rect class="hi" x="40" y="24" width="4" height="4"/><rect class="hi" x="44" y="24" width="4" height="4"/><rect class="md" x="48" y="24" width="4" height="4"/><rect class="md" x="52" y="24" width="4" height="4"/><rect class="sh" x="56" y="24" width="4" height="4"/>
    <!-- Row 7 — S middle bar (stroke body → .md) -->
    <rect class="sh" x="4" y="28" width="4" height="4"/><rect class="md" x="8" y="28" width="4" height="4"/><rect class="hi" x="12" y="28" width="4" height="4"/><rect class="hi" x="16" y="28" width="4" height="4"/><rect class="md" x="20" y="28" width="4" height="4"/><rect class="md" x="24" y="28" width="4" height="4"/><rect class="md" x="28" y="28" width="4" height="4"/><rect class="md" x="32" y="28" width="4" height="4"/><rect class="md" x="36" y="28" width="4" height="4"/><rect class="hi" x="40" y="28" width="4" height="4"/><rect class="hi" x="44" y="28" width="4" height="4"/><rect class="md" x="48" y="28" width="4" height="4"/><rect class="md" x="52" y="28" width="4" height="4"/><rect class="sh" x="56" y="28" width="4" height="4"/>
    <!-- Row 8 — shadow below middle bar (tapered), S right stem → .md -->
    <rect class="sh" x="4" y="32" width="4" height="4"/><rect class="md" x="8" y="32" width="4" height="4"/><rect class="hi" x="12" y="32" width="4" height="4"/><rect class="hi" x="16" y="32" width="4" height="4"/><rect class="sh" x="20" y="32" width="4" height="4"/><rect class="sh" x="24" y="32" width="4" height="4"/><rect class="sh" x="28" y="32" width="4" height="4"/><rect class="md" x="32" y="32" width="4" height="4"/><rect class="md" x="36" y="32" width="4" height="4"/><rect class="hi" x="40" y="32" width="4" height="4"/><rect class="hi" x="44" y="32" width="4" height="4"/><rect class="md" x="48" y="32" width="4" height="4"/><rect class="md" x="52" y="32" width="4" height="4"/><rect class="sh" x="56" y="32" width="4" height="4"/>
    <!-- Row 9 — S right stem (.md) -->
    <rect class="sh" x="4" y="36" width="4" height="4"/><rect class="md" x="8" y="36" width="4" height="4"/><rect class="hi" x="12" y="36" width="4" height="4"/><rect class="hi" x="16" y="36" width="4" height="4"/><rect class="hi" x="20" y="36" width="4" height="4"/><rect class="hi" x="24" y="36" width="4" height="4"/><rect class="hi" x="28" y="36" width="4" height="4"/><rect class="hi" x="32" y="36" width="4" height="4"/><rect class="md" x="36" y="36" width="4" height="4"/><rect class="hi" x="40" y="36" width="4" height="4"/><rect class="hi" x="44" y="36" width="4" height="4"/><rect class="md" x="48" y="36" width="4" height="4"/><rect class="md" x="52" y="36" width="4" height="4"/><rect class="sh" x="56" y="36" width="4" height="4"/>
    <!-- Row 10 — S bottom bar (stroke body → .md) -->
    <rect class="sh" x="8" y="40" width="4" height="4"/><rect class="md" x="12" y="40" width="4" height="4"/><rect class="hi" x="16" y="40" width="4" height="4"/><rect class="md" x="20" y="40" width="4" height="4"/><rect class="md" x="24" y="40" width="4" height="4"/><rect class="md" x="28" y="40" width="4" height="4"/><rect class="md" x="32" y="40" width="4" height="4"/><rect class="md" x="36" y="40" width="4" height="4"/><rect class="hi" x="40" y="40" width="4" height="4"/><rect class="hi" x="44" y="40" width="4" height="4"/><rect class="md" x="48" y="40" width="4" height="4"/><rect class="md" x="52" y="40" width="4" height="4"/><rect class="sh" x="56" y="40" width="4" height="4"/>
    <!-- Row 11 -->
    <rect class="sh" x="8" y="44" width="4" height="4"/><rect class="md" x="12" y="44" width="4" height="4"/><rect class="hi" x="16" y="44" width="4" height="4"/><rect class="hi" x="20" y="44" width="4" height="4"/><rect class="hi" x="24" y="44" width="4" height="4"/><rect class="hi" x="28" y="44" width="4" height="4"/><rect class="hi" x="32" y="44" width="4" height="4"/><rect class="hi" x="36" y="44" width="4" height="4"/><rect class="hi" x="40" y="44" width="4" height="4"/><rect class="hi" x="44" y="44" width="4" height="4"/><rect class="md" x="48" y="44" width="4" height="4"/><rect class="sh" x="52" y="44" width="4" height="4"/>
    <!-- Row 12 — bottom coin rim -->
    <rect class="sh" x="8" y="48" width="4" height="4"/><rect class="sh" x="12" y="48" width="4" height="4"/><rect class="md" x="16" y="48" width="4" height="4"/><rect class="md" x="20" y="48" width="4" height="4"/><rect class="md" x="24" y="48" width="4" height="4"/><rect class="md" x="28" y="48" width="4" height="4"/><rect class="md" x="32" y="48" width="4" height="4"/><rect class="md" x="36" y="48" width="4" height="4"/><rect class="md" x="40" y="48" width="4" height="4"/><rect class="md" x="44" y="48" width="4" height="4"/><rect class="sh" x="48" y="48" width="4" height="4"/><rect class="sh" x="52" y="48" width="4" height="4"/>
    <!-- Row 13 — bottom coin rim shadow -->
    <rect class="sh" x="12" y="52" width="4" height="4"/><rect class="sh" x="16" y="52" width="4" height="4"/><rect class="sh" x="20" y="52" width="4" height="4"/><rect class="sh" x="24" y="52" width="4" height="4"/><rect class="sh" x="28" y="52" width="4" height="4"/><rect class="sh" x="32" y="52" width="4" height="4"/><rect class="sh" x="36" y="52" width="4" height="4"/><rect class="sh" x="40" y="52" width="4" height="4"/><rect class="sh" x="44" y="52" width="4" height="4"/><rect class="sh" x="48" y="52" width="4" height="4"/>
  </g>
  <!-- Wordmark text — Orbitron matches site font-heading -->
  <text x="72" y="30"
    font-family="'Orbitron', system-ui, sans-serif"
    font-size="22" font-weight="700" letter-spacing="-0.5"
    fill="#F8FAFC">Stellaroid</text>
  <text x="72" y="50"
    font-family="'Orbitron', system-ui, sans-serif"
    font-size="13" font-weight="600" letter-spacing="3"
    fill="#F59E0B">EARN</text>
</svg>
