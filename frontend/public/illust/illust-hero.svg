<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" shape-rendering="crispEdges" role="img" aria-label="Register to Verify to Pay flow">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <style>
      .sh{fill:#78350F}.md{fill:#B45309}.hi{fill:#FBBF24}.gl{fill:#FEF3C7}
      .doc{fill:#1E293B}.doc2{fill:#334155}.docline{fill:#475569}
      .chk{fill:#2DD4BF}.chk2{fill:#14B8A6}
      .coin{fill:#FBBF24}.coin2{fill:#B45309}
      .bg{fill:#0F172A}.bgborder{fill:#334155}
      .flow{fill:url(#flow)}
      .label{fill:#94A3B8;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
    </style>
  </defs>

  <!-- Connector line -->
  <rect class="flow" x="100" y="76" width="280" height="8"/>

  <!-- Node 1: Register (document + hash) -->
  <g transform="translate(24, 32)">
    <rect class="bgborder" x="0" y="0" width="72" height="96" rx="8"/>
    <rect class="bg" x="2" y="2" width="68" height="92" rx="6"/>
    <!-- Document icon -->
    <rect class="doc2" x="20" y="20" width="32" height="40" rx="2"/>
    <rect class="doc" x="22" y="22" width="28" height="36"/>
    <rect class="docline" x="26" y="28" width="20" height="2"/>
    <rect class="docline" x="26" y="34" width="20" height="2"/>
    <rect class="docline" x="26" y="40" width="14" height="2"/>
    <rect class="hi" x="26" y="48" width="20" height="6"/>
    <!-- Label -->
    <text class="label" x="36" y="78" text-anchor="middle">REGISTER</text>
  </g>

  <!-- Node 2: Verify (checkmark) -->
  <g transform="translate(204, 32)">
    <rect class="bgborder" x="0" y="0" width="72" height="96" rx="8"/>
    <rect class="bg" x="2" y="2" width="68" height="92" rx="6"/>
    <!-- Check badge -->
    <circle cx="36" cy="40" r="20" fill="#2DD4BF" opacity="0.15"/>
    <circle cx="36" cy="40" r="14" fill="#2DD4BF"/>
    <!-- pixel check -->
    <rect class="bg" x="28" y="40" width="4" height="4"/>
    <rect class="bg" x="32" y="44" width="4" height="4"/>
    <rect class="bg" x="36" y="40" width="4" height="4"/>
    <rect class="bg" x="40" y="36" width="4" height="4"/>
    <rect class="bg" x="44" y="32" width="4" height="4"/>
    <text class="label" x="36" y="78" text-anchor="middle">VERIFY</text>
  </g>

  <!-- Node 3: Pay (coin) -->
  <g transform="translate(384, 32)">
    <rect class="bgborder" x="0" y="0" width="72" height="96" rx="8"/>
    <rect class="bg" x="2" y="2" width="68" height="92" rx="6"/>
    <!-- pixel coin (scaled down) -->
    <g transform="translate(18, 18) scale(0.55)">
      <rect class="sh" x="20" y="4" width="4" height="4"/><rect class="sh" x="24" y="4" width="4" height="4"/><rect class="sh" x="28" y="4" width="4" height="4"/><rect class="sh" x="32" y="4" width="4" height="4"/><rect class="sh" x="36" y="4" width="4" height="4"/><rect class="sh" x="40" y="4" width="4" height="4"/>
      <rect class="sh" x="12" y="8" width="4" height="4"/><rect class="sh" x="16" y="8" width="4" height="4"/><rect class="md" x="20" y="8" width="4" height="4"/><rect class="md" x="24" y="8" width="4" height="4"/><rect class="md" x="28" y="8" width="4" height="4"/><rect class="md" x="32" y="8" width="4" height="4"/><rect class="md" x="36" y="8" width="4" height="4"/><rect class="md" x="40" y="8" width="4" height="4"/><rect class="sh" x="44" y="8" width="4" height="4"/><rect class="sh" x="48" y="8" width="4" height="4"/>
