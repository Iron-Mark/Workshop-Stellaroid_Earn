      <rect class="sh" x="8" y="16" width="4" height="4"/><rect class="md" x="12" y="16" width="4" height="4"/><rect class="hi" x="16" y="16" width="4" height="4"/><rect class="sh" x="20" y="16" width="4" height="4"/><rect class="sh" x="24" y="16" width="4" height="4"/><rect class="sh" x="28" y="16" width="4" height="4"/><rect class="sh" x="32" y="16" width="4" height="4"/><rect class="sh" x="36" y="16" width="4" height="4"/><rect class="hi" x="40" y="16" width="4" height="4"/><rect class="hi" x="44" y="16" width="4" height="4"/><rect class="md" x="48" y="16" width="4" height="4"/><rect class="sh" x="52" y="16" width="4" height="4"/>
