      <rect class="sh" x="4" y="28" width="4" height="4"/><rect class="md" x="8" y="28" width="4" height="4"/><rect class="hi" x="12" y="28" width="4" height="4"/><rect class="hi" x="16" y="28" width="4" height="4"/><rect class="sh" x="20" y="28" width="4" height="4"/><rect class="sh" x="24" y="28" width="4" height="4"/><rect class="sh" x="28" y="28" width="4" height="4"/><rect class="sh" x="32" y="28" width="4" height="4"/><rect class="sh" x="36" y="28" width="4" height="4"/><rect class="hi" x="40" y="28" width="4" height="4"/><rect class="hi" x="44" y="28" width="4" height="4"/><rect class="md" x="48" y="28" width="4" height="4"/><rect class="md" x="52" y="28" width="4" height="4"/><rect class="sh" x="56" y="28" width="4" height="4"/>
      <rect class="sh" x="4" y="32" width="4" height="4"/><rect class="md" x="8" y="32" width="4" height="4"/><rect class="hi" x="12" y="32" width="4" height="4"/><rect class="hi" x="16" y="32" width="4" height="4"/><rect class="hi" x="20" y="32" width="4" height="4"/><rect class="hi" x="24" y="32" width="4" height="4"/><rect class="hi" x="28" y="32" width="4" height="4"/><rect class="hi" x="32" y="32" width="4" height="4"/><rect class="sh" x="36" y="32" width="4" height="4"/><rect class="hi" x="40" y="32" width="4" height="4"/><rect class="hi" x="44" y="32" width="4" height="4"/><rect class="md" x="48" y="32" width="4" height="4"/><rect class="md" x="52" y="32" width="4" height="4"/><rect class="sh" x="56" y="32" width="4" height="4"/>
      <rect class="sh" x="4" y="36" width="4" height="4"/><rect class="md" x="8" y="36" width="4" height="4"/><rect class="hi" x="12" y="36" width="4" height="4"/><rect class="hi" x="16" y="36" width="4" height="4"/><rect class="hi" x="20" y="36" width="4" height="4"/><rect class="hi" x="24" y="36" width="4" height="4"/><rect class="hi" x="28" y="36" width="4" height="4"/><rect class="hi" x="32" y="36" width="4" height="4"/><rect class="sh" x="36" y="36" width="4" height="4"/><rect class="hi" x="40" y="36" width="4" height="4"/><rect class="hi" x="44" y="36" width="4" height="4"/><rect class="md" x="48" y="36" width="4" height="4"/><rect class="md" x="52" y="36" width="4" height="4"/><rect class="sh" x="56" y="36" width="4" height="4"/>
