      <rect class="sh" x="8" y="44" width="4" height="4"/><rect class="md" x="12" y="44" width="4" height="4"/><rect class="hi" x="16" y="44" width="4" height="4"/><rect class="hi" x="20" y="44" width="4" height="4"/><rect class="hi" x="24" y="44" width="4" height="4"/><rect class="hi" x="28" y="44" width="4" height="4"/><rect class="hi" x="32" y="44" width="4" height="4"/><rect class="hi" x="36" y="44" width="4" height="4"/><rect class="hi" x="40" y="44" width="4" height="4"/><rect class="hi" x="44" y="44" width="4" height="4"/><rect class="md" x="48" y="44" width="4" height="4"/><rect class="sh" x="52" y="44" width="4" height="4"/>
      <rect class="sh" x="8" y="48" width="4" height="4"/><rect class="sh" x="12" y="48" width="4" height="4"/><rect class="md" x="16" y="48" width="4" height="4"/><rect class="md" x="20" y="48" width="4" height="4"/><rect class="md" x="24" y="48" width="4" height="4"/><rect class="md" x="28" y="48" width="4" height="4"/><rect class="md" x="32" y="48" width="4" height="4"/><rect class="md" x="36" y="48" width="4" height="4"/><rect class="md" x="40" y="48" width="4" height="4"/><rect class="md" x="44" y="48" width="4" height="4"/><rect class="sh" x="48" y="48" width="4" height="4"/><rect class="sh" x="52" y="48" width="4" height="4"/>
