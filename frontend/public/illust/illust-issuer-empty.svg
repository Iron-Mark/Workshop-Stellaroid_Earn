<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Blank ID badge with empty amber identity strip — no issuer record registered yet">
  <title>No Issuer Record</title>
  <!--
    Pixel art ID badge — 80×64 canvas (portrait orientation).

    Badge: slate border + dark face, person silhouette, name/role lines.
    Bottom amber strip: completely empty (no blocks, just the dark amber bg)
        = the record slot exists but has not been filled in yet.
        Contrast with illust-register.svg which has amber hash blocks = "pending".

    Faint triple-dot in strip echoes the "···" from illust-register.svg,
    but in darker amber (#78350F) = "not even started yet."
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .body{fill:#475569}
      .line{fill:#475569}
      .dim{fill:#2E3F52}
      .key-bg{fill:#451A03}
      .key-dim{fill:#78350F}
      .dark{fill:#0F172A}
    </style>
  </defs>

  <!-- Drop shadow (offset +2/+2) -->
  <rect x="22" y="8" width="32" height="50" class="dark" opacity="0.55" shape-rendering="crispEdges"/>

  <!-- Badge border -->
  <rect x="20" y="6" width="32" height="50" class="bdr" shape-rendering="crispEdges"/>

  <!-- Badge face -->
  <rect x="22" y="8" width="28" height="46" class="card" shape-rendering="crispEdges"/>

  <!-- Lanyard notch (top center) -->
  <rect x="29" y="5" width="10" height="5" class="bdr" shape-rendering="crispEdges"/>
  <rect x="31" y="5" width="6"  height="4" class="dark" shape-rendering="crispEdges"/>

  <!-- ── PERSON SILHOUETTE ──────────────────────────────── -->
  <!-- Head -->
  <rect x="30" y="14" width="12" height="10" class="body" shape-rendering="crispEdges"/>
  <!-- Shoulders / body -->
  <rect x="26" y="24" width="20" height="12" class="body" shape-rendering="crispEdges"/>

  <!-- ── PROFILE LINES ──────────────────────────────────── -->
  <!-- Name line -->
  <rect x="26" y="38" width="20" height="2" class="line" shape-rendering="crispEdges"/>
  <!-- Role line (shorter, darker = not yet filled) -->
  <rect x="28" y="42" width="16" height="2" class="dim"  shape-rendering="crispEdges"/>

  <!-- ── IDENTITY STRIP (empty — no record) ────────────── -->
  <rect x="22" y="46" width="28" height="8" class="key-bg" shape-rendering="crispEdges"/>

  <!-- Faint dots (slot exists but nothing registered) -->
  <rect x="26" y="49" width="4" height="2" class="key-dim" shape-rendering="crispEdges"/>
  <rect x="32" y="49" width="4" height="2" class="key-dim" shape-rendering="crispEdges"/>
  <rect x="38" y="49" width="4" height="2" class="key-dim" shape-rendering="crispEdges"/>

</svg>
