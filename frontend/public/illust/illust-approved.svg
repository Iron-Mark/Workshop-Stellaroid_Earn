<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Certificate document with verified hash checkmark — credential approved on-chain">
  <title>Approved Credential</title>
  <!--
    Pixel art approved certificate icon — 80×64 canvas.

    Same document shape as illust-register.svg for visual continuity.
    Hash strip: 6 hex blocks + approval checkmark (replaces the ··· truncation dots).
    The checkmark is rendered in a brighter amber (#FBBF24 = logo .hi glint),
    making it distinct from the regular hash blocks and readable as "done / verified".

    Visual narrative:
      illust-register.svg  →  hash strip ends with ···  (hash exists, pending)
      illust-approved.svg  →  hash strip ends with  ✓   (hash anchored and verified)
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .fold{fill:#475569}
      .title{fill:#94A3B8}
      .line{fill:#475569}
      .hash-bg{fill:#451A03}
      .hash{fill:#F59E0B}
      .hash2{fill:#D97706}
      .check{fill:#FBBF24}
    </style>
  </defs>

  <!-- Drop shadow (offset +2/+2) -->
  <polygon points="10,6 58,6 70,18 70,62 10,62" fill="#0F172A" opacity="0.55"/>

  <!-- Document border (folded-corner polygon) -->
  <polygon points="8,4 56,4 68,16 68,60 8,60" class="bdr"/>

  <!-- Document face -->
  <polygon points="10,6 55,6 66,17 66,58 10,58" class="card"/>

  <!-- Fold triangle -->
  <polygon points="56,4 68,4 68,16" class="fold"/>

  <!-- Fold crease line -->
  <line x1="56" y1="4" x2="68" y2="16" stroke="#334155" stroke-width="1.5"/>

  <!-- ── DOCUMENT CONTENT ─────────────────────────────── -->

  <!-- Title bars -->
  <rect x="16" y="14" width="30" height="4" class="title" shape-rendering="crispEdges"/>
  <rect x="16" y="20" width="22" height="4" class="title" shape-rendering="crispEdges"/>

  <!-- Section divider -->
  <rect x="16" y="27" width="42" height="1" class="bdr" shape-rendering="crispEdges"/>

  <!-- Body text lines -->
  <rect x="16" y="31" width="38" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="35" width="34" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="39" width="28" height="2" class="line" shape-rendering="crispEdges"/>

  <!-- ── HASH STRIP (verified) ──────────────────────────── -->
  <rect x="16" y="45" width="44" height="9" class="hash-bg" shape-rendering="crispEdges"/>

  <!-- 6 hex-pair blocks (same layout as illust-register.svg) -->
  <rect x="17" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="22" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="27" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="32" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="37" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="42" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>

  <!-- ✓ approval checkmark (bright amber — replaces the ··· dots in register icon) -->
  <!-- Left arm: (46,49) → (48,51)  descending to the bend                         -->
  <!-- Right arm: (48,51) → (50,49) → (52,47)  ascending to upper-right            -->
  <rect x="46" y="49" width="2" height="2" class="check" shape-rendering="crispEdges"/>
  <rect x="48" y="51" width="2" height="2" class="check" shape-rendering="crispEdges"/>
  <rect x="50" y="49" width="2" height="2" class="check" shape-rendering="crispEdges"/>
  <rect x="52" y="47" width="2" height="2" class="check" shape-rendering="crispEdges"/>

</svg>
