<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Credit card with amber connector socket — Freighter wallet needs to be set up">
  <title>Wallet Setup</title>
  <!--
    Pixel art wallet card — 80×64 canvas.

    Card: slate border + dark face, chip, number lines.
    Connector socket: dark amber zone (right side of card) with two amber pins
        and a dark gap — the same amber as keyhole / hash strip, meaning
        "this is where Freighter connects."
    Signal bars: three muted bars to the right — "not yet connected / no signal."
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .chip{fill:#475569}
      .line{fill:#475569}
      .key-bg{fill:#451A03}
      .key{fill:#F59E0B}
      .key2{fill:#D97706}
      .dark{fill:#0F172A}
      .muted{fill:#2E3F52}
    </style>
  </defs>

  <!-- Drop shadow (offset +2/+2) -->
  <rect x="10" y="18" width="48" height="32" class="dark" opacity="0.55" shape-rendering="crispEdges"/>

  <!-- Card border -->
  <rect x="8" y="16" width="48" height="32" class="bdr" shape-rendering="crispEdges"/>

  <!-- Card face -->
  <rect x="10" y="18" width="44" height="28" class="card" shape-rendering="crispEdges"/>

  <!-- IC chip (outer) -->
  <rect x="14" y="24" width="10" height="8" class="chip" shape-rendering="crispEdges"/>
  <!-- Chip grooves -->
  <rect x="14" y="25" width="10" height="2" class="bdr" shape-rendering="crispEdges"/>
  <rect x="14" y="29" width="10" height="2" class="bdr" shape-rendering="crispEdges"/>

  <!-- Card number lines -->
  <rect x="14" y="36" width="8" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="24" y="36" width="8" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="34" y="36" width="8" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="44" y="36" width="6" height="2" class="line" shape-rendering="crispEdges"/>

  <!-- ── CONNECTOR SOCKET (right edge of card face) ─────── -->
  <!-- Dark amber zone = "Freighter connects here"           -->
  <rect x="46" y="22" width="8" height="20" class="key-bg" shape-rendering="crispEdges"/>

  <!-- Top pin -->
  <rect x="48" y="25" width="4" height="5" class="key"  shape-rendering="crispEdges"/>
  <!-- Bottom pin -->
  <rect x="48" y="34" width="4" height="5" class="key2" shape-rendering="crispEdges"/>
  <!-- Center gap (socket hole) -->
  <rect x="49" y="30" width="2" height="4" class="dark" shape-rendering="crispEdges"/>

  <!-- Signal bars (right of card — not yet connected) -->
  <rect x="60" y="24" width="4" height="3" class="muted" shape-rendering="crispEdges"/>
  <rect x="60" y="30" width="4" height="3" class="muted" shape-rendering="crispEdges"/>
  <rect x="60" y="36" width="4" height="3" class="muted" shape-rendering="crispEdges"/>

</svg>
