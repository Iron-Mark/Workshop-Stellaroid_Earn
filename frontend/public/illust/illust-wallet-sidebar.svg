<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" shape-rendering="crispEdges" role="img" aria-label="Wallet card connecting to Stellar network">
  <defs>
    <style>
      .bdr{fill:#334155}.card{fill:#1E293B}.fold{fill:#475569}
      .key-bg{fill:#451A03}.key{fill:#F59E0B}.key2{fill:#D97706}
      .dark{fill:#0F172A}.muted{fill:#2E3F52}.dim{fill:#64748B}
    </style>
  </defs>

  <!-- ── WALLET CARD (left) ─────────────────────────── -->
  <!-- Shadow -->
  <rect x="10" y="22" width="48" height="60" class="dark" opacity="0.4"/>
  <!-- Card border -->
  <rect x="8"  y="20" width="48" height="60" class="bdr"/>
  <!-- Card face -->
  <rect x="10" y="22" width="44" height="56" class="card"/>
  <!-- Top stripe (chip area) -->
  <rect x="10" y="22" width="44" height="10" class="fold"/>
  <!-- EMV chip -->
  <rect x="14" y="24" width="10" height="6" class="dim"/>
  <rect x="15" y="25" width="8"  height="4" class="muted"/>
  <!-- Card number lines -->
  <rect x="14" y="38" width="8"  height="3" class="muted"/>
  <rect x="24" y="38" width="8"  height="3" class="muted"/>
  <rect x="34" y="38" width="8"  height="3" class="muted"/>
  <!-- Name line -->
  <rect x="14" y="46" width="18" height="2" class="muted"/>
  <!-- Bottom accent line -->
  <rect x="10" y="70" width="44" height="2" class="key-bg"/>
  <rect x="14" y="70" width="6"  height="2" class="key2"/>
  <rect x="22" y="70" width="4"  height="2" class="key2"/>

  <!-- Amber connector port on right edge of card -->
  <rect x="54" y="44" width="4"  height="12" class="key-bg"/>
  <rect x="55" y="46" width="2"  height="4"  class="key"/>
  <rect x="55" y="52" width="2"  height="2"  class="key2"/>

  <!-- ── CONNECTION DASHES (middle) ────────────────── -->
  <rect x="62" y="49" width="6" height="2" class="muted"/>
  <rect x="72" y="49" width="6" height="2" class="muted"/>
  <rect x="82" y="49" width="6" height="2" class="muted"/>

  <!-- ── STELLAR NETWORK ORB (right) ───────────────── -->
  <!-- Drop shadow -->
  <rect x="98"  y="30" width="50" height="44" class="dark" opacity="0.35" rx="0"/>
  <!-- Outer ring -->
  <rect x="96"  y="28" width="50" height="44" class="bdr"/>
  <!-- Orb face -->
  <rect x="98"  y="30" width="46" height="40" class="card"/>
  <!-- Inner glow ring (key-bg frame) -->
  <rect x="102" y="34" width="38" height="32" class="key-bg"/>
  <!-- Inner face -->
  <rect x="104" y="36" width="34" height="28" class="dark"/>

  <!-- Amber 4-pointed diamond star, centered at (121, 50) -->
  <!-- Top spike -->
  <rect x="119" y="38" width="4" height="4" class="key"/>
  <rect x="119" y="42" width="4" height="2" class="key"/>
  <!-- Left spike -->
  <rect x="113" y="48" width="4" height="4" class="key"/>
  <rect x="117" y="48" width="2" height="4" class="key"/>
  <!-- Right spike -->
  <rect x="125" y="48" width="4" height="4" class="key"/>
  <rect x="123" y="48" width="2" height="4" class="key"/>
  <!-- Bottom spike -->
  <rect x="119" y="56" width="4" height="4" class="key"/>
  <rect x="119" y="54" width="4" height="2" class="key"/>
  <!-- Center cross body -->
  <rect x="117" y="44" width="8" height="12" class="key"/>
  <rect x="115" y="48" width="12" height="4" class="key"/>
  <!-- Center highlight -->
  <rect x="119" y="48" width="4" height="4" class="key2"/>

</svg>
