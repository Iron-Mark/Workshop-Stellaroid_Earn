<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Certificate document with padlock in hash strip — proof block locked until registration">
  <title>Proof Block Locked</title>
  <!--
    Same document base as illust-register.svg / illust-verify.svg / illust-approved.svg.
    Hash strip indicator tells the story:
      illust-register.svg     → ···  (hash pending)
      illust-proof-locked.svg → 🔒  (no amber at all — not even registered yet)
      illust-verify.svg       → 🔍  (on-chain, inspect it)
      illust-approved.svg     → ✓   (verified)

    Slate padlock on dark amber strip = "locked before registration."
    Zero amber content = earlier state than register.
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .fold{fill:#475569}
      .title{fill:#94A3B8}
      .line{fill:#475569}
      .hash-bg{fill:#451A03}
      .lock{fill:#475569}
      .lock-hi{fill:#64748B}
      .hole{fill:#0F172A}
    </style>
  </defs>

  <!-- Drop shadow -->
  <polygon points="10,6 58,6 70,18 70,62 10,62" fill="#0F172A" opacity="0.55"/>

  <!-- Document border -->
  <polygon points="8,4 56,4 68,16 68,60 8,60" class="bdr"/>

  <!-- Document face -->
  <polygon points="10,6 55,6 66,17 66,58 10,58" class="card"/>

  <!-- Fold triangle -->
  <polygon points="56,4 68,4 68,16" class="fold"/>

  <!-- Fold crease -->
  <line x1="56" y1="4" x2="68" y2="16" stroke="#334155" stroke-width="1.5"/>

  <!-- Title bars -->
  <rect x="16" y="14" width="30" height="4" class="title" shape-rendering="crispEdges"/>
  <rect x="16" y="20" width="22" height="4" class="title" shape-rendering="crispEdges"/>

  <!-- Section divider -->
  <rect x="16" y="27" width="42" height="1" class="bdr" shape-rendering="crispEdges"/>

  <!-- Body lines -->
  <rect x="16" y="31" width="38" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="35" width="34" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="39" width="28" height="2" class="line" shape-rendering="crispEdges"/>

  <!-- Hash strip bg (empty — no amber blocks) -->
  <rect x="16" y="45" width="44" height="9" class="hash-bg" shape-rendering="crispEdges"/>

  <!-- ── PIXEL PADLOCK (slate — no amber = not started yet) ── -->

  <!-- Shackle top cap -->
  <rect x="35" y="43" width="6" height="2" class="lock-hi" shape-rendering="crispEdges"/>
  <!-- Shackle left arm -->
  <rect x="35" y="45" width="2" height="5" class="lock-hi" shape-rendering="crispEdges"/>
  <!-- Shackle right arm -->
  <rect x="39" y="45" width="2" height="5" class="lock-hi" shape-rendering="crispEdges"/>

  <!-- Lock body -->
  <rect x="33" y="49" width="10" height="6" class="lock" shape-rendering="crispEdges"/>

  <!-- Keyhole -->
  <rect x="36" y="50" width="4" height="4" class="hole" shape-rendering="crispEdges"/>
  <rect x="37" y="52" width="2" height="2" class="lock" shape-rendering="crispEdges"/>

</svg>
