<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" role="img" aria-label="Coin with exclamation mark - error">
  <defs>
    <style>
      .sh{fill:#78350F}.md{fill:#B45309}.hi{fill:#FBBF24}.gl{fill:#FEF3C7}.dg{fill:#CD0202}
    </style>
  </defs>
  <!--
    Same coin structure as logo.svg, centered in 64×64.
    Glyph: ! in red (.dg) — stem y=16–28, gap y=32–36, dot y=40, all at x=28,32.
    No rotation — avoids crispEdges aliasing from the previous rotate(-8) transform.
  -->
  <g transform="translate(0, 2)">
    <!-- Row 1 — top coin rim -->
    <rect class="sh" x="20" y="4"  width="4" height="4"/><rect class="sh" x="24" y="4"  width="4" height="4"/><rect class="sh" x="28" y="4"  width="4" height="4"/><rect class="sh" x="32" y="4"  width="4" height="4"/><rect class="sh" x="36" y="4"  width="4" height="4"/><rect class="sh" x="40" y="4"  width="4" height="4"/>
    <!-- Row 2 -->
    <rect class="sh" x="12" y="8"  width="4" height="4"/><rect class="sh" x="16" y="8"  width="4" height="4"/><rect class="md" x="20" y="8"  width="4" height="4"/><rect class="md" x="24" y="8"  width="4" height="4"/><rect class="md" x="28" y="8"  width="4" height="4"/><rect class="md" x="32" y="8"  width="4" height="4"/><rect class="md" x="36" y="8"  width="4" height="4"/><rect class="md" x="40" y="8"  width="4" height="4"/><rect class="sh" x="44" y="8"  width="4" height="4"/><rect class="sh" x="48" y="8"  width="4" height="4"/>
    <!-- Row 3 — coin face with specular glint -->
    <rect class="sh" x="8"  y="12" width="4" height="4"/><rect class="md" x="12" y="12" width="4" height="4"/><rect class="hi" x="16" y="12" width="4" height="4"/><rect class="hi" x="20" y="12" width="4" height="4"/><rect class="hi" x="24" y="12" width="4" height="4"/><rect class="gl" x="28" y="12" width="4" height="4"/><rect class="hi" x="32" y="12" width="4" height="4"/><rect class="hi" x="36" y="12" width="4" height="4"/><rect class="hi" x="40" y="12" width="4" height="4"/><rect class="hi" x="44" y="12" width="4" height="4"/><rect class="md" x="48" y="12" width="4" height="4"/><rect class="sh" x="52" y="12" width="4" height="4"/>
    <!-- Row 4 — ! stem row 1 -->
    <rect class="sh" x="8"  y="16" width="4" height="4"/><rect class="md" x="12" y="16" width="4" height="4"/><rect class="hi" x="16" y="16" width="4" height="4"/><rect class="hi" x="20" y="16" width="4" height="4"/><rect class="hi" x="24" y="16" width="4" height="4"/><rect class="dg" x="28" y="16" width="4" height="4"/><rect class="dg" x="32" y="16" width="4" height="4"/><rect class="hi" x="36" y="16" width="4" height="4"/><rect class="hi" x="40" y="16" width="4" height="4"/><rect class="hi" x="44" y="16" width="4" height="4"/><rect class="md" x="48" y="16" width="4" height="4"/><rect class="sh" x="52" y="16" width="4" height="4"/>
    <!-- Row 5 — ! stem row 2 -->
    <rect class="sh" x="4"  y="20" width="4" height="4"/><rect class="md" x="8"  y="20" width="4" height="4"/><rect class="hi" x="12" y="20" width="4" height="4"/><rect class="hi" x="16" y="20" width="4" height="4"/><rect class="hi" x="20" y="20" width="4" height="4"/><rect class="hi" x="24" y="20" width="4" height="4"/><rect class="dg" x="28" y="20" width="4" height="4"/><rect class="dg" x="32" y="20" width="4" height="4"/><rect class="hi" x="36" y="20" width="4" height="4"/><rect class="hi" x="40" y="20" width="4" height="4"/><rect class="hi" x="44" y="20" width="4" height="4"/><rect class="md" x="48" y="20" width="4" height="4"/><rect class="md" x="52" y="20" width="4" height="4"/><rect class="sh" x="56" y="20" width="4" height="4"/>
    <!-- Row 6 — ! stem row 3 -->
    <rect class="sh" x="4"  y="24" width="4" height="4"/><rect class="md" x="8"  y="24" width="4" height="4"/><rect class="hi" x="12" y="24" width="4" height="4"/><rect class="hi" x="16" y="24" width="4" height="4"/><rect class="hi" x="20" y="24" width="4" height="4"/><rect class="hi" x="24" y="24" width="4" height="4"/><rect class="dg" x="28" y="24" width="4" height="4"/><rect class="dg" x="32" y="24" width="4" height="4"/><rect class="hi" x="36" y="24" width="4" height="4"/><rect class="hi" x="40" y="24" width="4" height="4"/><rect class="hi" x="44" y="24" width="4" height="4"/><rect class="md" x="48" y="24" width="4" height="4"/><rect class="md" x="52" y="24" width="4" height="4"/><rect class="sh" x="56" y="24" width="4" height="4"/>
