<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Chain with an empty amber link — no on-chain events yet">
  <title>No Activity Yet</title>
  <!--
    Pixel art chain links — 80×64 canvas.

    Left ring:  solid slate = existing chain (contract is deployed).
    Right ring: dark amber bg + bright amber ring + dark hole
                = empty slot, same visual language as the hash strip
                  and keyhole — "this link is waiting to be filled."
    Hint lines: three muted bars right of the chain = pending tx data.

    Replaces the antenna concept which felt off-brand.
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .mid{fill:#475569}
      .key-bg{fill:#451A03}
      .key{fill:#F59E0B}
      .dark{fill:#0F172A}
      .muted{fill:#2E3F52}
    </style>
  </defs>

  <!-- Drop shadow (both rings) -->
  <rect x="14" y="24" width="50" height="20" class="dark" opacity="0.45" shape-rendering="crispEdges"/>

  <!-- ── LEFT RING (closed — existing chain) ───────────────── -->
  <rect x="12" y="22" width="22" height="20" class="bdr"  shape-rendering="crispEdges"/>
  <rect x="16" y="26" width="14" height="12" class="card" shape-rendering="crispEdges"/>

  <!-- ── BRIDGE BAR ─────────────────────────────────────────── -->
  <rect x="34" y="28" width="6"  height="8"  class="mid"  shape-rendering="crispEdges"/>

  <!-- ── RIGHT RING (empty — awaiting first transaction) ────── -->
  <!-- Outer slate frame (matches left ring) -->
  <rect x="40" y="22" width="22" height="20" class="bdr"  shape-rendering="crispEdges"/>
  <!-- Dark amber inner bg (same as hash strip / keyhole zone) -->
  <rect x="42" y="24" width="18" height="16" class="key-bg" shape-rendering="crispEdges"/>
  <!-- Amber ring (same action-indicator color as ✓ / 🔍 / 🪙) -->
  <rect x="44" y="26" width="14" height="12" class="key"  shape-rendering="crispEdges"/>
  <!-- Dark center hole -->
  <rect x="48" y="30" width="6"  height="4"  class="dark" shape-rendering="crispEdges"/>

  <!-- ── ACTIVITY HINT LINES (right — tx data not yet present) -->
  <rect x="66" y="26" width="4"  height="3"  class="muted" shape-rendering="crispEdges"/>
  <rect x="66" y="32" width="4"  height="3"  class="muted" shape-rendering="crispEdges"/>
  <rect x="66" y="38" width="4"  height="3"  class="muted" shape-rendering="crispEdges"/>

</svg>
