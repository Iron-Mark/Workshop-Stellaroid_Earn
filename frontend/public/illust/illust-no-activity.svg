<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Signal antenna with no signal and amber tip — no on-chain events yet">
  <title>No Activity Yet</title>
  <!--
    Pixel art signal antenna — 80×64 canvas.

    Three concentric arcs in slate = no signal received.
    Amber tip = antenna is live and listening, just quiet.
    Base + ground plate anchors it.

    Narrative: "contract is deployed, no events yet" — the
    antenna is ON (amber tip) but the airwaves are empty (slate arcs).
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .mid{fill:#475569}
      .check{fill:#FBBF24}
      .dark{fill:#0F172A}
      .base{fill:#3B4F63}
    </style>
  </defs>

  <!-- ── DROP SHADOW (base only) ──────────────────────────── -->
  <rect x="30" y="50" width="22" height="4" class="dark" opacity="0.5" shape-rendering="crispEdges"/>

  <!-- ── ANTENNA STICK ─────────────────────────────────────── -->
  <rect x="39" y="16" width="2" height="30" class="bdr" shape-rendering="crispEdges"/>

  <!-- ── AMBER TIP (antenna is live / listening) ───────────── -->
  <rect x="38" y="12" width="4" height="4" class="check" shape-rendering="crispEdges"/>

  <!-- ── SIGNAL ARCS (all slate = no signal yet) ───────────── -->

  <!-- Arc 1 — innermost -->
  <rect x="34" y="28" width="12" height="2" class="mid"  shape-rendering="crispEdges"/>
  <rect x="32" y="30" width="2"  height="5" class="mid"  shape-rendering="crispEdges"/>
  <rect x="46" y="30" width="2"  height="5" class="mid"  shape-rendering="crispEdges"/>

  <!-- Arc 2 — middle -->
  <rect x="28" y="24" width="24" height="2" class="mid"  shape-rendering="crispEdges"/>
  <rect x="26" y="26" width="2"  height="7" class="mid"  shape-rendering="crispEdges"/>
  <rect x="52" y="26" width="2"  height="7" class="mid"  shape-rendering="crispEdges"/>

  <!-- Arc 3 — outermost (faintest) -->
  <rect x="22" y="20" width="36" height="2" class="bdr"  shape-rendering="crispEdges"/>
  <rect x="20" y="22" width="2"  height="9" class="bdr"  shape-rendering="crispEdges"/>
  <rect x="58" y="22" width="2"  height="9" class="bdr"  shape-rendering="crispEdges"/>

  <!-- ── BASE ──────────────────────────────────────────────── -->
  <rect x="32" y="46" width="16" height="4" class="bdr"  shape-rendering="crispEdges"/>
  <!-- Ground plate -->
  <rect x="28" y="50" width="24" height="3" class="base" shape-rendering="crispEdges"/>

</svg>
