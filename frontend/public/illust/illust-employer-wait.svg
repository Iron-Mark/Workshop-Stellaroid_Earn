<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Padlock with amber keyhole — payment locked until trusted verification">
  <title>Wait for Verification</title>
  <!--
    Pixel art padlock icon — 80×64 canvas.

    Shackle: hollow U-arch with left-face highlight → looks 3-D and closed.
    Body:    slate rectangle with top-rim depth cue.
    Keyhole zone: dark amber bg — echoes the hash strip in illust-register.svg,
        visually tying both icons to the same credential theme.
    Keyhole: large amber ring + stem — brand color = "verification unlocks this".
    Credential lines: three short bars right of keyhole — "data is here, gated".
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .shackle{fill:#475569}
      .shackle-hi{fill:#64748B}
      .hole{fill:#0F172A}
      .key-bg{fill:#451A03}
      .key{fill:#F59E0B}
      .key2{fill:#D97706}
      .cred{fill:#2E3F52}
    </style>
  </defs>

  <!-- Shackle drop shadow (offset +2/+2) -->
  <path d="M30,30 L30,16 Q30,6 40,6 Q50,6 50,16 L50,30 L46,30 L46,17 Q46,10 40,10 Q34,10 34,17 L34,30 Z"
    fill="#0F172A" opacity="0.5"/>

  <!-- Shackle (hollow U-arch) -->
  <path d="M28,28 L28,15 Q28,4 40,4 Q52,4 52,15 L52,28 L48,28 L48,16 Q48,8 40,8 Q32,8 32,16 L32,28 Z"
    class="shackle"/>

  <!-- Shackle left-arm highlight (3-D depth cue) -->
  <rect x="28" y="15" width="2" height="13" class="shackle-hi" shape-rendering="crispEdges"/>

  <!-- Lock body drop shadow (offset +2/+2) -->
  <rect x="20" y="28" width="42" height="32" class="hole" opacity="0.5" shape-rendering="crispEdges"/>

  <!-- Lock body border -->
  <rect x="18" y="26" width="42" height="32" class="bdr" shape-rendering="crispEdges"/>

  <!-- Lock body face -->
  <rect x="20" y="28" width="38" height="28" class="card" shape-rendering="crispEdges"/>

  <!-- Face top rim -->
  <rect x="20" y="28" width="38" height="2" class="bdr" shape-rendering="crispEdges"/>

  <!-- Dark amber keyhole zone (echoes hash strip in illust-register.svg) -->
  <rect x="29" y="31" width="20" height="22" class="key-bg" shape-rendering="crispEdges"/>

  <!-- Keyhole: amber outer ring -->
  <rect x="32" y="33" width="14" height="14" class="key" shape-rendering="crispEdges"/>
  <!-- Keyhole: dark inner -->
  <rect x="35" y="36" width="8" height="8" class="hole" shape-rendering="crispEdges"/>
  <!-- Keyhole: amber stem -->
  <rect x="36" y="47" width="6" height="6" class="key2" shape-rendering="crispEdges"/>

  <!-- Credential lines right of keyhole (gated data hint) -->
  <rect x="52" y="34" width="4" height="3" class="cred" shape-rendering="crispEdges"/>
  <rect x="52" y="40" width="4" height="3" class="cred" shape-rendering="crispEdges"/>
  <rect x="52" y="46" width="4" height="3" class="cred" shape-rendering="crispEdges"/>

</svg>
