<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Certificate document with hash and magnifying glass — inspect and verify on-chain">
  <title>Verify Credential</title>
  <!--
    Pixel art verify certificate icon — 80×64 canvas.

    Identical document structure to illust-register.svg for visual continuity.
    Hash strip indicator changes tell the narrative:
      illust-register.svg  →  ···  (hash registered, truncated — still pending)
      illust-verify.svg    →  🔍  (hash on-chain, now look it up and endorse it)
      illust-approved.svg  →  ✓   (hash anchored and verified)

    The magnifying glass replaces the truncation dots — same bright amber (#FBBF24)
    as the checkmark in illust-approved.svg so all three "action indicators" share
    the same highlight color.
  -->
  <defs>
    <style>
      .bdr{fill:#334155}
      .card{fill:#1E293B}
      .fold{fill:#475569}
      .title{fill:#94A3B8}
      .line{fill:#475569}
      .hash-bg{fill:#451A03}
      .hash{fill:#F59E0B}
      .hash2{fill:#D97706}
      .check{fill:#FBBF24}
    </style>
  </defs>

  <!-- Drop shadow (offset +2/+2) -->
  <polygon points="10,6 58,6 70,18 70,62 10,62" fill="#0F172A" opacity="0.55"/>

  <!-- Document border (folded-corner polygon) -->
  <polygon points="8,4 56,4 68,16 68,60 8,60" class="bdr"/>

  <!-- Document face -->
  <polygon points="10,6 55,6 66,17 66,58 10,58" class="card"/>

  <!-- Fold triangle -->
  <polygon points="56,4 68,4 68,16" class="fold"/>

  <!-- Fold crease line -->
  <line x1="56" y1="4" x2="68" y2="16" stroke="#334155" stroke-width="1.5"/>

  <!-- ── DOCUMENT CONTENT ─────────────────────────────── -->

  <!-- Title bars -->
  <rect x="16" y="14" width="30" height="4" class="title" shape-rendering="crispEdges"/>
  <rect x="16" y="20" width="22" height="4" class="title" shape-rendering="crispEdges"/>

  <!-- Section divider -->
  <rect x="16" y="27" width="42" height="1" class="bdr" shape-rendering="crispEdges"/>

  <!-- Body text lines -->
  <rect x="16" y="31" width="38" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="35" width="34" height="2" class="line" shape-rendering="crispEdges"/>
  <rect x="16" y="39" width="28" height="2" class="line" shape-rendering="crispEdges"/>

  <!-- ── HASH STRIP (on-chain, pending endorsement) ──── -->
  <rect x="16" y="45" width="44" height="9" class="hash-bg" shape-rendering="crispEdges"/>

  <!-- 6 hex-pair blocks (hash is on-chain) -->
  <rect x="17" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="22" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="27" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="32" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>
  <rect x="37" y="47" width="4" height="5" class="hash"  shape-rendering="crispEdges"/>
  <rect x="42" y="47" width="4" height="5" class="hash2" shape-rendering="crispEdges"/>

  <!-- 🔍 magnifying glass (inspect → endorse) replaces ··· truncation dots -->
  <!-- Lens: top cap -->
  <rect x="49" y="46" width="4" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- Lens: left side -->
  <rect x="47" y="48" width="2" height="4" class="check" shape-rendering="crispEdges"/>
  <!-- Lens: right side -->
  <rect x="53" y="48" width="2" height="4" class="check" shape-rendering="crispEdges"/>
  <!-- Lens: bottom cap -->
  <rect x="49" y="52" width="4" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- Handle (diagonal step lower-right) -->
  <rect x="55" y="52" width="2" height="2" class="check" shape-rendering="crispEdges"/>

</svg>
