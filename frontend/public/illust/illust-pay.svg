<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" role="img"
  aria-label="Stellar coin with payment arrow — pay to unlock verified credential">
  <title>Pay to Unlock</title>
  <!--
    Pixel art payment coin — 80×64 canvas.

    Coin: round gold disc, dark amber face, 4-pointed Stellar brand star.
    Arrow: rightward step-arrow — "send / pay now".

    Palette echoes illust-employer-wait.svg:
      #451A03 → coin face    (same dark amber as keyhole zone + hash strip bg)
      #F59E0B → coin ring    (same amber as keyhole ring)
      #FBBF24 → star + arrow (same bright amber as ✓ / 🔍 action indicators)
  -->
  <defs>
    <style>
      .check{fill:#FBBF24}
      .key{fill:#F59E0B}
      .face{fill:#451A03}
    </style>
  </defs>

  <!-- Drop shadow (offset +2/+2) -->
  <circle cx="34" cy="35" r="15" fill="#0F172A" opacity="0.55"/>

  <!-- Coin ring (amber gold) -->
  <circle cx="32" cy="33" r="15" class="key"/>

  <!-- Coin face (dark amber) -->
  <circle cx="32" cy="33" r="12" class="face"/>

  <!-- ── 4-POINTED STELLAR STAR ────────────────────────── -->
  <!-- Centered at (32, 33), diamond shape in bright amber  -->
  <!-- top tip -->
  <rect x="31" y="26" width="2" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- row 2 -->
  <rect x="29" y="28" width="6" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- row 3 -->
  <rect x="27" y="30" width="10" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- wide middle (center of star at y=33) -->
  <rect x="25" y="32" width="14" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- row 5 -->
  <rect x="27" y="34" width="10" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- row 6 -->
  <rect x="29" y="36" width="6" height="2" class="check" shape-rendering="crispEdges"/>
  <!-- bottom tip -->
  <rect x="31" y="38" width="2" height="2" class="check" shape-rendering="crispEdges"/>

  <!-- ── PAYMENT ARROW (→) ─────────────────────────────── -->
  <!-- Centered at y=33, stepped arrowhead in bright amber  -->
  <!-- shaft -->
  <rect x="52" y="32" width="8"  height="2" class="check" shape-rendering="crispEdges"/>
  <!-- arrowhead step 1 (base — widest) -->
  <rect x="60" y="30" width="2"  height="6" class="check" shape-rendering="crispEdges"/>
  <!-- arrowhead step 2 -->
  <rect x="62" y="31" width="2"  height="4" class="check" shape-rendering="crispEdges"/>
  <!-- arrowhead tip -->
  <rect x="64" y="32" width="2"  height="2" class="check" shape-rendering="crispEdges"/>

</svg>
