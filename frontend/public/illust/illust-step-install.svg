<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img"
  aria-label="Browser window with amber extension icon — install Freighter">
  <title>Install Freighter</title>
  <!--
    24×24 step icon — drop-in replacement for the amber numbered circle.
    Amber circle background is baked in so it matches the original styling.
    Browser + amber extension dot in chrome = "install the browser extension."
  -->

  <!-- Amber circle background (matches CSS bg-[rgba(245,158,11,0.14)]) -->
  <circle cx="12" cy="12" r="12" fill="rgba(245,158,11,0.14)"/>

  <!-- Browser outer frame -->
  <rect x="4" y="5" width="16" height="14" fill="#334155" shape-rendering="crispEdges"/>
  <!-- Browser face -->
  <rect x="5" y="6" width="14" height="12" fill="#1E293B" shape-rendering="crispEdges"/>
  <!-- Chrome bar -->
  <rect x="5" y="6" width="14" height="4"  fill="#475569" shape-rendering="crispEdges"/>

  <!-- URL bar -->
  <rect x="7" y="7" width="7" height="2" fill="#334155" shape-rendering="crispEdges"/>

  <!-- Amber extension icon (top-right of chrome) -->
  <rect x="17" y="7" width="2" height="2" fill="#F59E0B" shape-rendering="crispEdges"/>

  <!-- Page content lines -->
  <rect x="7" y="12" width="8" height="2" fill="#475569" shape-rendering="crispEdges"/>
  <rect x="7" y="16" width="5" height="2" fill="#475569" shape-rendering="crispEdges"/>

</svg>
