<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Pixel art checkmark — 16×16, 2px block grid -->
  <!-- Left arm descending to bend -->
  <rect x="2"  y="6"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <rect x="4"  y="8"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <!-- Bend (lowest point) -->
  <rect x="6"  y="10" width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <!-- Right arm ascending to upper-right -->
  <rect x="8"  y="8"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <rect x="10" y="6"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <rect x="12" y="4"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
  <rect x="14" y="2"  width="2" height="2" fill="#0F172A" shape-rendering="crispEdges"/>
</svg>
